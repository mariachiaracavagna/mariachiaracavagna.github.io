<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EQ Tagging — Pilot (3 versions)</title>
  <script src="lib/jspsych.js"></script>
  <script src="lib/plugin-preload.js"></script>
  <script src="lib/plugin-html-button-response.js"></script>
  <script src="lib/plugin-html-keyboard-response.js"></script>
  <script src="lib/plugin-instructions.js"></script>
  <script src="lib/plugin-survey-likert.js"></script>
  <script src="lib/plugin-survey-multi-choice.js"></script>
  <script src="lib/plugin-survey-html-form.js"></script>
  <script src="lib/plugin-call-function.js"></script>
  <script src="lib/sortable.js"></script>
  <link  href="lib/jspsych.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="experiment_trials.js"></script>
  <style>
    /* ===== tweakable props =====
       --accent      : recolors progress bar, Reference framing, selected answers,
                       slider fill/thumb and the Continue button. Players stay grey.
       --pole-color / --pole-weight : slider endpoint emphasis
                       (prominent = #46463f / 600, subtle = #8a8a84 / 400). */
    :root{
      --accent:#3247ff;
      --accent-tint:rgba(50,71,255,.07);
      --accent-tint-strong:rgba(50,71,255,.12);
      --bg:#fbfbfa; --card:#fff;
      --text:#1c1c1a; --text-2:#46463f; --muted:#8a8a84; --faint:#a8a89f;
      --line:#ececea; --line-2:#e4e4e0; --line-3:#dededa;
      --warn:#b0752a;
      --player:#8a8a84;
      --pole-color:#46463f; --pole-weight:600;
      --font:'Source Sans 3',system-ui,-apple-system,'Segoe UI',sans-serif;
    }
    html,body{background:var(--bg)}
    body,.jspsych-display-element,.jspsych-btn,input,select,textarea,button{font-family:var(--font)}
    .jspsych-display-element{color:var(--text);font-size:16px}
    .jspsych-content-wrapper{background:var(--bg)}
    /* Vertical rhythm scales with viewport height: roomy on a big screen, tightening
       only as far as it must to keep a whole trial on one screen without scrolling. */
    .jspsych-content{max-width:600px;padding:clamp(12px,2vh,24px) 24px clamp(16px,2vh,24px);text-wrap:pretty}
    h1,h2,h3,h4{color:var(--text);text-wrap:pretty}
    h2,h3{font-size:22px;font-weight:600;margin:0 0 10px}
    h4{font-size:15px;font-weight:600;margin:0 0 6px}
    p{color:var(--text-2);line-height:1.45;text-wrap:pretty}
    a{color:var(--accent)}
    /* long-form pages (welcome/consent) */
    .doc{text-align:center;margin-bottom:4px}
    .doc p{margin:0 0 10px}

    /* progress bar */
    #jspsych-progressbar-container{background:var(--bg);border-bottom:1px solid var(--line);color:var(--muted)}
    #jspsych-progressbar-container span{font-size:12px;color:var(--muted)}
    #jspsych-progressbar-outer{background:var(--line-2);border-radius:7px;overflow:hidden}
    #jspsych-progressbar-inner{background:var(--accent);border-radius:7px}

    /* prompt */
    .prompt{font-size:18px;font-weight:500;line-height:1.3;text-align:center;color:var(--text);margin:0 0 clamp(4px,1vh,10px)}
    .prompt strong{font-weight:700}

    /* players — always grey, never accent.
       Labels sit beside the player (not above) to keep a whole trial on one screen. */
    #players{display:flex;flex-direction:column;gap:clamp(4px,1vh,8px);align-items:center;margin:clamp(8px,1.4vh,14px) 0 0;
             max-width:100%}
    .seg{display:grid;grid-template-columns:88px minmax(0,320px);align-items:center;column-gap:10px;max-width:100%}
    .seglabel{font-size:13px;font-weight:700;color:var(--text-2);letter-spacing:.02em;text-align:right}
    /* native player sits directly on the page; grayscale + a slight darkening for contrast */
    audio{width:100%;max-width:320px;height:clamp(42px,5.2vh,46px);display:block;margin-inline:auto;filter:grayscale(1) brightness(.85)}

    /* reference: framed row, grey player inside */
    .seg.is-ref{border:1px solid var(--accent);background:var(--accent-tint);border-radius:12px;
                padding:clamp(3px,.7vh,6px) 8px;margin:clamp(2px,.4vh,4px) 0}
    .seg.is-ref .seglabel{color:var(--accent);letter-spacing:.04em;text-transform:uppercase}

    #listen-hint{color:var(--warn);font-size:13px;text-align:center;margin:clamp(7px,1.3vh,13px) 0 0}

    /* answer options */
    .opt{display:flex;align-items:center;gap:9px;padding:clamp(5px,.9vh,8px) 10px;border:1px solid var(--line-2);border-radius:10px;
         background:var(--card);cursor:pointer;font-size:16px;color:var(--text)}
    .opt+.opt{margin-top:clamp(4px,.8vh,7px)}
    .opt input{accent-color:var(--accent);margin:0}
    .opt:hover{border-color:var(--line-3)}
    .opt.sel{background:var(--accent-tint);border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
    .optlist{display:block;text-align:left;margin:clamp(8px,1.4vh,12px) auto 0;max-width:340px}

    table.assign{margin:clamp(8px,1.4vh,12px) auto 0;border-collapse:collapse}
    table.assign td{padding:clamp(4px,.7vh,6px) 10px;text-align:left;vertical-align:middle;font-size:16px;color:var(--text)}
    table.assign input[type=radio]{accent-color:var(--accent)}
    .ratehdr{text-align:center;font-size:12px;color:var(--muted);line-height:1.2;font-weight:400}
    select{font-size:15px;padding:3px}

    /* bipolar slider: neutral track + centre tick. Static by design — nothing here
       recolors with the value, so the scale never nudges the participant. */
    .forced-wrap{margin:clamp(12px,1.9vh,18px) auto 0;padding-top:clamp(10px,1.5vh,14px);border-top:1px solid var(--line);max-width:420px}
    .forced-q{font-size:15px;font-weight:600;color:var(--text);text-align:center;margin:0 0 clamp(8px,1.2vh,12px)}
    .forced-track{position:relative;height:22px}
    .forced-rail{position:absolute;top:8px;left:0;right:0;height:6px;border-radius:3px;background:var(--line-2)}
    .forced-tick{position:absolute;top:5px;left:50%;width:1px;height:12px;background:var(--faint);transform:translateX(-.5px)}
    .forced-slider{position:absolute;top:0;left:0;width:100%;height:22px;margin:0;background:none;
                   -webkit-appearance:none;appearance:none;outline:none;cursor:pointer}
    .forced-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;
                   background:var(--accent);border:2px solid var(--card);box-shadow:0 0 0 1px var(--line-3);cursor:pointer}
    .forced-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--accent);
                   border:2px solid var(--card);box-shadow:0 0 0 1px var(--line-3);cursor:pointer}
    .forced-slider::-moz-range-track{background:none}
    .forced-poles{display:flex;justify-content:space-between;gap:16px;font-size:13px;line-height:1.25;margin-top:5px;
                  color:var(--pole-color);font-weight:var(--pole-weight)}
    .forced-poles span{flex:1}
    .forced-poles span:last-child{text-align:right}

    /* v3 match */
    #players .dz-row{display:grid;grid-template-columns:88px minmax(0,320px) 160px;align-items:center;column-gap:10px;
                     justify-content:center;max-width:100%}
    .dz-label{font-size:13px;font-weight:700;color:var(--text-2);text-align:right;white-space:nowrap}
    .dz-audio{width:100%;max-width:320px}
    .slot{width:160px;min-height:36px;border:1px dashed var(--line-3);border-radius:10px;display:flex;align-items:center;
          justify-content:center;padding:2px;box-sizing:border-box;background:var(--card)}
    .slot.filled{border-style:solid;border-color:var(--accent);background:var(--accent-tint)}
    .slot .chip{border:none;background:transparent;padding:6px 10px}
    .bank{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:clamp(4px,.8vh,8px);min-height:40px;padding:clamp(4px,.8vh,8px)}
    .chip{background:var(--card);border:1px solid var(--line-3);border-radius:10px;padding:clamp(5px,1vh,9px) 14px;cursor:grab;
          user-select:none;font-size:16px;color:var(--text);white-space:nowrap}
    .chip:active{cursor:grabbing}
    .sortable-ghost{opacity:.4}
    .hint{font-size:12px;color:var(--muted);text-align:center;margin:8px 0 2px}

    /* ===== narrow screens (phones) =====
       Nothing may exceed the viewport width: the page must never pan sideways.
       Vertical scrolling is fine. Rows stack instead of shrinking the player,
       and in v3 each slot stays paired with its own segment so a drag is always
       a short, local gesture rather than a trip across the page. */
    @media (max-width:560px){
      .jspsych-content{padding-left:12px;padding-right:12px;max-width:100%}
      .seg{grid-template-columns:minmax(0,1fr);row-gap:1px;justify-items:center;width:100%}
      .seglabel{text-align:left;align-self:start;width:100%;max-width:320px}
      .seg.is-ref{padding:5px 8px 7px}
      audio{max-width:100%}

      #players .dz-row{grid-template-columns:minmax(0,1fr) auto;
                       grid-template-areas:"label slot" "audio audio";row-gap:3px;column-gap:8px;width:100%}
      .dz-label{grid-area:label;text-align:left;align-self:center}
      .dz-audio{grid-area:audio;max-width:100%}
      .slot{grid-area:slot;width:150px;justify-self:end}
      .bank{gap:7px;padding:2px}
      .forced-poles{font-size:12px;gap:10px}
      .optlist{max-width:100%}
      /* the 6-column rating grid is the widest thing in the study — let it use the
         full width and give the radio columns only the room they need */
      table.assign{width:100%}
      table.assign td{padding:5px 2px;font-size:15px}
      table.assign td:first-child{padding-right:6px}
      .ratehdr{font-size:11px}
    }

    /* buttons */
    .jspsych-btn{font-size:16px;font-weight:600;padding:8px 20px;border-radius:10px;border:none;
                 background:var(--accent);color:#fff;cursor:pointer;transition:opacity .12s}
    .jspsych-btn:hover{background:var(--accent);opacity:.9}
    .jspsych-btn:disabled,.jspsych-btn:disabled:hover{background:#ededea;color:#b0b0a8;cursor:not-allowed;opacity:1}
    .btn-back{background:var(--card);color:var(--text-2);border:1px solid var(--line-3)}
    .btn-back:hover{background:var(--card);border-color:var(--muted);opacity:1}
    textarea{font-size:15px;border:1px solid var(--line-2);border-radius:10px;padding:8px;color:var(--text)}
  </style>
</head>
<body></body>
<script>
/* ===== CONFIG: set DATAPIPE_ID after creating a free experiment at
   https://pipe.jatos.org . Leave as placeholder to test locally
   (data downloads to your computer at the end). ===== */
const DATAPIPE_ID = "Pqtt6yAMupO8";

window.addEventListener('error', function(e){
  document.body.innerHTML = '<div style="max-width:700px;margin:40px auto;font-family:system-ui;color:#c62828">'
    +'<h3>Something failed to load</h3><p>'+(e.message||e)+'</p>'
    +'<p>Check that the <code>lib</code> folder and <code>experiment_trials.js</code> are next to <code>index.html</code>.</p></div>';
});
(function(){
  const names=['initJsPsych','jsPsychPreload','jsPsychHtmlButtonResponse','jsPsychHtmlKeyboardResponse',
    'jsPsychInstructions','jsPsychSurveyLikert','jsPsychSurveyMultiChoice','jsPsychSurveyHtmlForm','jsPsychCallFunction','Sortable'];
  const missing=names.filter(n=>typeof window[n]==='undefined');
  if(typeof TRIALS==='undefined') missing.push('TRIALS (experiment_trials.js)');
  if(missing.length) throw new Error('Not loaded: '+missing.join(', '));
})();

/* progress is set manually from the step pointer (see snapStep) so that going Back
   rewinds the bar instead of pushing it forward on every revisit */
const jsPsych = initJsPsych({ show_progress_bar:true, message_progress_bar:'Progress', auto_update_progress_bar:false });

const urlp = new URLSearchParams(window.location.search);
const PID = urlp.get('id') || urlp.get('PROLIFIC_PID') || jsPsych.randomization.randomID(8);
const VERSION_ORDER = jsPsych.randomization.shuffle(['v1','v2','v3']);
jsPsych.data.addProperties({ participant_id:PID, version_order:VERSION_ORDER.join('>') });

/* navigation + answer persistence (for Back within a section) */
const STORE = {};   // trial_id -> saved answer state (restored when a trial is revisited)
const BUILT = {};   // trial_id -> built trial pieces (stable shuffles across revisits)
let NAV = 0;        // increments each render; used to keep only the final answer per trial at save
let GOING_BACK = false;

/* ---------- helpers ---------- */
const sh = a => jsPsych.randomization.shuffle(a);
function playersHTML(segments){
  let h='<div id="players">';
  segments.forEach((s,i)=>{ h+='<div class="seg'+(s.isRef?' is-ref':'')+'"><div class="seglabel">'
    +s.label+'</div>'
    +'<audio id="aud'+i+'" src="'+s.url+'" controls preload="auto"></audio></div>'; });
  h+='</div><div id="listen-hint">Please play each clip to the end before continuing.</div>';
  return h;
}
// the forcedness slider markup, placed at the bottom of every trial's form
function sliderHTML(){
  return '<div class="forced-wrap"><p class="forced-q">Did your choice feel accurate?</p>'
    +'<div class="forced-track"><div class="forced-rail"></div><div class="forced-tick"></div>'
    +'<input type="range" min="0" max="100" value="50" name="forcedness" class="forced-slider"></div>'
    +'<div class="forced-poles"><span>My choice felt forced (I had to choose tags I find inaccurate)</span>'
    +'<span>My choice felt truthful</span></div></div>';
}
// tint the chosen option row (accent ring + faint accent background)
function markSelected(root){
  const opts=Array.from(root.querySelectorAll('.opt')); if(!opts.length) return;
  const sync=()=>opts.forEach(o=>o.classList.toggle('sel', o.querySelector('input').checked));
  opts.forEach(o=>o.querySelector('input').addEventListener('change',sync)); sync();
}
function controlsIn(root){ return Array.from(root.querySelectorAll('input[type=submit], button[type=submit], .jspsych-btn')); }
function wireGating(root, controls, trialId, startUnlocked){
  const audios=Array.from(root.querySelectorAll('#players audio'));
  const played=audios.map(()=>false), lastT=audios.map(()=>0);
  const setD=v=>controls.forEach(c=>{ c.disabled=v; });
  audios.forEach(a=>a.addEventListener('play',()=>audios.forEach(o=>{ if(o!==a) o.pause(); }))); // one at a time
  if(startUnlocked){ setD(false); const h=root.querySelector('#listen-hint'); if(h) h.style.display='none'; return; } // already heard on an earlier visit
  setD(true);
  audios.forEach((a,idx)=>{
    a.addEventListener('timeupdate',()=>{ if(!a.seeking && a.currentTime>lastT[idx]+1.0 && !played[idx]) a.currentTime=lastT[idx]; else lastT[idx]=a.currentTime; });
    a.addEventListener('seeking',()=>{ if(a.currentTime>lastT[idx]+1.0 && !played[idx]) a.currentTime=lastT[idx]; });
    a.addEventListener('ended',()=>{ played[idx]=true; lastT[idx]=0;
      if(played.every(Boolean)){ setD(false); const h=root.querySelector('#listen-hint'); if(h) h.style.display='none';
        if(trialId){ STORE[trialId]=STORE[trialId]||{}; STORE[trialId].unlocked=true; } } });
  });
}
// require the slider to be moved before the form submits; also run a caller validator
function wireForm(root, extraValidate){
  const form=root.querySelector('form');
  const s=root.querySelector('.forced-slider');
  markSelected(root);
  if(s) s.addEventListener('input',()=>{ s.dataset.moved='1'; });
  form.addEventListener('submit',function(e){
    if(GOING_BACK) return; // going back: don't validate, just leave this trial
    if(extraValidate && !extraValidate(form)){ e.preventDefault(); e.stopPropagation(); return; }
    if(s && !s.dataset.moved){ e.preventDefault(); e.stopPropagation(); alert('Please move the slider to show how the answer felt.'); }
  }, true);
}
// a Back button that leaves the current trial without validation (answers are saved on_finish)
function addBackButton(root){
  const submitBtn=controlsIn(root)[0]; if(!submitBtn) return;
  const form=root.querySelector('form');
  const back=document.createElement('button');
  back.type='button'; back.textContent='Back'; back.className='jspsych-btn btn-back'; back.style.marginRight='10px';
  back.addEventListener('click',function(){
    GOING_BACK=true;
    form.querySelectorAll('[required]').forEach(el=>el.removeAttribute('required'));
    if(form.requestSubmit) form.requestSubmit(); else { submitBtn.disabled=false; submitBtn.click(); }
  });
  submitBtn.parentNode.insertBefore(back, submitBtn);
}
function refSegments(t){ const ctx=sh(t.ctx_urls.slice());
  const segs=ctx.map((u,i)=>({label:'Segment '+(i+1),url:u,isRef:false}));
  segs.push({label:'Reference',url:t.ref_url,isRef:true});
  return { segs, presented_order:ctx.join(' | ') };
}
const forced = respVal => (100 - (+respVal))/100; // left=forced(1) .. right=truthful(0)

/* Each builder returns {preamble, html, data, onLoad(root,opts), onFinish(d)}.
   Built once per trial_id (stable shuffles) so answers restore correctly on Back. */

/* ---------- v1: choose one (radios + slider) ---------- */
function buildChoose(t){
  const {segs,presented_order}=refSegments(t);
  const choices=sh(t.choices.slice());
  const radios=choices.map(c=>'<label class="opt"><input type="radio" name="tag" value="'+c.word+'" required> '+c.word+'</label>').join('');
  return {
    preamble:'<p class="prompt">Listen to all segments fully. Then, choose from the list below the word that best describes <strong>how the Reference sounds compared with the segments above it</strong>.</p>'+playersHTML(segs),
    html:'<div class="optlist">'+radios+'</div>'+sliderHTML(),
    data:{task:'tag', version:(t.version==='practice'?'practice':'v1'), response_format:'choose', practice:(t.version==='practice'),
          trial_id:t.trial_id, track_id:t.track_id, ref_eq:t.ref_eq, presented_order:presented_order,
          choice_map:Object.fromEntries(choices.map(c=>[c.word,c.method]))},
    onLoad:function(root, opts){
      const st=STORE[t.trial_id];
      wireGating(root, controlsIn(root), t.trial_id, !!(st&&st.unlocked));
      if(st){ if(st.tag) root.querySelectorAll('input[name=tag]').forEach(r=>{ if(r.value===st.tag) r.checked=true; });
        const sl=root.querySelector('.forced-slider'); if(sl&&st.forcedness!=null){ sl.value=st.forcedness; sl.dataset.moved='1'; } }
      wireForm(root);
      if(opts&&opts.canBack) addBackButton(root);
    },
    onFinish:function(d){ const w=d.response.tag; d.chosen_word=w; d.chosen_method=d.choice_map[w]; d.forcedness=forced(d.response.forcedness);
      STORE[t.trial_id]=Object.assign(STORE[t.trial_id]||{}, {tag:w, forcedness:d.response.forcedness}); }
  };
}

/* ---------- v2: rate each word 1-5 for accuracy to the reference ---------- */
function buildRate(t){
  const {segs,presented_order}=refSegments(t);
  const choices=sh(t.choices.slice());
  let rows='<table class="assign"><tr><td></td>'
    +'<td class="ratehdr">1<br>not<br>accurate</td><td class="ratehdr">2</td><td class="ratehdr">3</td><td class="ratehdr">4</td><td class="ratehdr">5<br>very<br>accurate</td></tr>';
  choices.forEach((c,i)=>{ let cells='';
    for(let r=1;r<=5;r++) cells+='<td style="text-align:center"><input type="radio" name="rate_'+i+'" value="'+r+'"'+(r===1?' required':'')+'></td>';
    rows+='<tr><td>'+c.word+'</td>'+cells+'</tr>'; });
  rows+='</table>';
  return {
    preamble:'<p class="prompt">Listen to all segments fully. Then, rate how accurately each word describes <strong>how the Reference sounds compared with the segments above it</strong>.</p>'+playersHTML(segs),
    html:rows+sliderHTML(),
    data:{task:'tag', version:'v2', response_format:'rate', trial_id:t.trial_id, track_id:t.track_id, ref_eq:t.ref_eq,
          presented_order:presented_order, rate_methods:choices.map(c=>c.method), rate_words:choices.map(c=>c.word)},
    onLoad:function(root, opts){
      const st=STORE[t.trial_id];
      wireGating(root, controlsIn(root), t.trial_id, !!(st&&st.unlocked));
      if(st&&st.rates){ st.rates.forEach((val,i)=>{ if(val!=null) root.querySelectorAll('input[name=rate_'+i+']').forEach(r=>{ if(r.value===String(val)) r.checked=true; }); });
        const sl=root.querySelector('.forced-slider'); if(sl&&st.forcedness!=null){ sl.value=st.forcedness; sl.dataset.moved='1'; } }
      wireForm(root);
      if(opts&&opts.canBack) addBackButton(root);
    },
    onFinish:function(d){ const r={}, raw=[]; choices.forEach((c,i)=>{ r[c.method]=d.response['rate_'+i]; raw[i]=d.response['rate_'+i]; }); d.ratings=r; d.forcedness=forced(d.response.forcedness);
      STORE[t.trial_id]=Object.assign(STORE[t.trial_id]||{}, {rates:raw, forcedness:d.response.forcedness}); }
  };
}

/* ---------- v3: drag 5 words onto 5 segments (drag-and-drop + slider) ---------- */
function buildMatch(t){
  const segList=sh(t.segments.map(s=>({...s}))).map(s=>({url:s.url,true_tag:s.true_tag,eq:s.eq}));
  const pool=sh(t.segments.map(s=>s.true_tag));
  let grid='<div id="players">';
  segList.forEach((s,i)=>{ grid+='<div class="dz-row">'
    +'<div class="dz-label">Segment '+(i+1)+'</div>'
    +'<audio id="aud'+i+'" class="dz-audio" src="'+s.url+'" controls preload="auto"></audio>'
    +'<div class="slot" id="slot-'+i+'" data-i="'+i+'"></div>'
    +'<input type="hidden" name="seg_'+i+'" value="">'
    +'</div>'; });
  grid+='</div><div id="listen-hint">Please play each clip to the end before continuing.</div>';
  const bank='<div id="tagbank" class="bank">'+pool.map(w=>'<div class="chip" data-tag="'+w+'">'+w+'</div>').join('')+'</div>';
  return {
    preamble:'<p class="prompt">Listen to all segments fully. Then, drag each word into the slot beside the segment it best describes. <strong>Every word is used exactly once.</strong></p>',
    html:grid+'<p class="hint">Drag the words below up into the slots</p>'+bank+sliderHTML(),
    data:{task:'match', version:'v3', trial_id:t.trial_id, track_id:t.track_id, model:t.model,
          seg_true:segList.map(s=>s.true_tag), seg_eq:segList.map(s=>s.eq), tag_pool:pool},
    onLoad:function(root, opts){
      const st=STORE[t.trial_id];
      wireGating(root, controlsIn(root), t.trial_id, !!(st&&st.unlocked));
      const slots=Array.from(root.querySelectorAll('.slot'));
      const setHidden=()=>slots.forEach(sl=>{ const chip=sl.querySelector('.chip'); sl.classList.toggle('filled',!!chip);
        root.querySelector('input[name=seg_'+sl.dataset.i+']').value = chip?chip.dataset.tag:''; });
      const grp={name:'tags', pull:true, put:function(to){ return to.el.id==='tagbank' || to.el.children.length===0; }};
      /* touch: a short press-and-hold starts the drag, so an ordinary swipe that happens to
         begin on a chip still scrolls the page. Auto-scroll keeps distant slots reachable. */
      const sortOpts={group:grp, animation:120, delay:150, delayOnTouchOnly:true, touchStartThreshold:5,
                      scroll:true, scrollSensitivity:60, scrollSpeed:12, fallbackTolerance:5,
                      onSort:setHidden, onAdd:setHidden, onRemove:setHidden};
      new Sortable(root.querySelector('#tagbank'), Object.assign({}, sortOpts));
      slots.forEach(sl=> new Sortable(sl, Object.assign({}, sortOpts)));
      if(st&&st.assign){ st.assign.forEach((tag,i)=>{ if(tag){ const chip=Array.from(root.querySelectorAll('#tagbank .chip')).find(c=>c.dataset.tag===tag); const slot=root.querySelector('#slot-'+i); if(chip&&slot) slot.appendChild(chip); } }); }
      setHidden();
      if(st){ const sl=root.querySelector('.forced-slider'); if(sl&&st.forcedness!=null){ sl.value=st.forcedness; sl.dataset.moved='1'; } }
      wireForm(root, function(){ if(slots.some(sl=>!sl.querySelector('.chip'))){ alert('Drag a word into every segment\'s slot.'); return false; } return true; });
      if(opts&&opts.canBack) addBackButton(root);
    },
    onFinish:function(d){ const assigned=segList.map((s,i)=>d.response['seg_'+i]);
      d.assigned=assigned; const corr=segList.map((s,i)=>assigned[i]===s.true_tag);
      d.n_correct=corr.filter(Boolean).length; d.accuracy=d.n_correct/5; d.exact_match=(d.n_correct===5); d.forcedness=forced(d.response.forcedness);
      STORE[t.trial_id]=Object.assign(STORE[t.trial_id]||{}, {assign:assigned, forcedness:d.response.forcedness}); }
  };
}

const BUILDERS={ v1:buildChoose, v2:buildRate, v3:buildMatch, practice:buildChoose };
function getBuilt(v,t){ if(!BUILT[t.trial_id]) BUILT[t.trial_id]=BUILDERS[v](t); return BUILT[t.trial_id]; }

/* practice: single standalone trial (no Back) */
function practiceNode(){
  const t=TRIALS.practice;
  return { type: jsPsychSurveyHtmlForm, button_label:'Continue',
    preamble: function(){ return getBuilt('practice',t).preamble; },
    html:     function(){ return getBuilt('practice',t).html; },
    data:     function(){ return Object.assign({}, getBuilt('practice',t).data); },
    on_load:  function(){ getBuilt('practice',t).onLoad(document.querySelector('.jspsych-content'), {canBack:false}); },
    on_finish:function(d){ getBuilt('practice',t).onFinish(d); } };
}

/* ---------- main body: one flat, ordered list of steps across every section ----------
   A single loop walks STEPS via the global pointer GIDX. Because every trial in the
   study lives in this one loop (rather than one loop per section), Back can cross a
   section boundary: from the first trial of a section it returns to the last trial of
   the previous one. Each loop pass snapshots the current step into CUR, and the three
   step nodes are conditional on CUR.kind, so exactly one of them runs per pass. */
const TASK_DESC = { v1:'choose the single best word', v2:'rate how accurately each word describes the Reference', v3:'match each word to a segment' };
const STEPS=[];
VERSION_ORDER.forEach(v=>{
  STEPS.push({kind:'intro', v});
  TRIALS[v].forEach((t,i)=>STEPS.push({kind:'trial', v, i}));
  STEPS.push({kind:'post', v});
});
const N_TRIALS = STEPS.filter(s=>s.kind==='trial').length;
let GIDX=0, CUR=STEPS[0];
const SEEN={};  // step index -> true, for intros/checks already completed
const stepOf = () => STEPS[GIDX];
const curTrial = () => TRIALS[CUR.v][CUR.i];
// nearest earlier trial — skips over the intro/check screens between sections
function prevTrialIdx(g){ for(let j=g-1;j>=0;j--) if(STEPS[j].kind==='trial') return j; return -1; }
// next step forward, skipping intros/checks already completed (e.g. after going back a section)
function nextIdx(g){ for(let j=g+1;j<STEPS.length;j++){ if(STEPS[j].kind==='trial' || !SEEN[j]) return j; } return STEPS.length; }
function advance(){ SEEN[GIDX]=true; GIDX=nextIdx(GIDX); }
function trialsDone(g){ let c=0; for(let j=0;j<g;j++) if(STEPS[j].kind==='trial') c++; return c; }

const snapStep={ type: jsPsychCallFunction, func:function(){ CUR=stepOf(); jsPsych.progressBar.progress=trialsDone(GIDX)/N_TRIALS; } };
const onlyIf=(kind,node)=>({ timeline:[node], conditional_function:function(){ return CUR.kind===kind; } });

const introNode={ type: jsPsychHtmlButtonResponse,
  stimulus:function(){ return '<h2>Next section</h2><p>In this section your task is to <strong>'+TASK_DESC[CUR.v]+'</strong> for each trial.</p>'
    +'<p>Listen to every segment fully. Nothing advances on its own — you choose when to continue, and can change your answer before you do. Use <strong>Back</strong> to return to an earlier trial if you want to revise it, including trials from a previous section. At the bottom of each trial, move the slider to show how forced vs truthful the answer felt.</p>'; },
  choices:['Start'], on_finish:advance };

const trialNode={ type: jsPsychSurveyHtmlForm, button_label:'Continue',
  preamble: function(){ return getBuilt(CUR.v, curTrial()).preamble; },
  html:     function(){ return getBuilt(CUR.v, curTrial()).html; },
  data:     function(){ return Object.assign({}, getBuilt(CUR.v, curTrial()).data, {nav_seq:++NAV}); },
  on_load:  function(){ getBuilt(CUR.v, curTrial()).onLoad(document.querySelector('.jspsych-content'), {canBack: prevTrialIdx(GIDX)>=0}); },
  on_finish:function(d){ getBuilt(CUR.v, curTrial()).onFinish(d);
    if(GOING_BACK){ GOING_BACK=false; GIDX=prevTrialIdx(GIDX); } else { advance(); } } };

const postNode={ type: jsPsychSurveyLikert, preamble:'<h4>Quick check</h4>', questions:[
    {prompt:'How mentally tired do you feel right now?', labels:['1 not at all','2','3','4','5 extremely'], required:true, name:'tired'},
    {prompt:'How clear was this task?', labels:['1 very unclear','2','3','4','5 very clear'], required:true, name:'clear'}
  ], data:function(){ return {task:'post_version', version:CUR.v}; }, on_finish:advance };

const mainLoop={ timeline:[snapStep, onlyIf('intro',introNode), onlyIf('trial',trialNode), onlyIf('post',postNode)],
  loop_function:function(){ return GIDX < STEPS.length; } };

/* ---------- timeline ---------- */
const timeline=[];
const allAudio=[...new Set([].concat(
  ...[...TRIALS.v1,...TRIALS.v2,TRIALS.practice].map(t=>[t.ref_url,...t.ctx_urls]),
  ...TRIALS.v3.map(t=>t.segments.map(s=>s.url))
))];
timeline.push({ type: jsPsychPreload, audio:allAudio, message:'Loading audio…', show_progress_bar:true, continue_after_error:true });

timeline.push({ type: jsPsychHtmlButtonResponse,
  stimulus:'<div class="doc"><h2>Welcome</h2>'
    +'<p>Thank you for taking part in this study.</p>'
    +'<p>This survey is part of an MSc Computer Science thesis at <strong>Queen Mary University of London</strong>, conducted by <strong>Mariachiara Cavagna</strong> under the supervision of <strong>Dr Georgios Velissaridis</strong>.</p>'
    +'<p>The study investigates how people describe differences in audio recordings, specifically those resulting from equalization (EQ). Equalization refers to the balance of frequencies in an audio signal.</p>'
    +'<p>During the survey, you will listen to different EQ versions of the same audio tracks, and you will have to choose how to describe them. The survey is divided into three short sections, each focusing on a different aspect of your listening experience.</p>'
    +'<p>The survey takes approximately <strong>15–20 minutes</strong> to complete. For the best listening experience, please wear <strong>headphones</strong> and complete the survey in a <strong>quiet environment</strong>.</p>'
    +'<p>Your responses are anonymous and will be used for research purposes only. Participation is voluntary, and you may stop the survey at any time without penalty.</p>'
    +'<p>By continuing, you confirm that you are at least 18 years old and consent to participate in this study.</p>'
    +'<p>If you have any questions about the study, please contact <strong>Mariachiara Cavagna</strong> at <a href="mailto:m.cavagna@se25.qmul.ac.uk">m.cavagna@se25.qmul.ac.uk</a>.</p>'
    +'<p>Thank you for your participation.</p></div>',
  choices:['I agree — continue'] });

timeline.push({ type: jsPsychHtmlButtonResponse,
  stimulus:'<h3>Headphone check</h3><p>Put on your headphones and set a comfortable volume with the clip below. You should hear it clearly in both ears.</p><audio src="'+TRIALS.practice.ref_url+'" controls preload="auto" style="width:320px;max-width:100%"></audio><p class="hint">If you can\'t hear it, raise your volume or check your headphones.</p>',
  choices:['Quit','I can hear it clearly'],
  button_html:(choice,i)=>'<button class="jspsych-btn'+(i===0?' btn-back':'')+'">'+choice+'</button>',
  data:{task:'headphone_check'},
  on_finish:function(d){ if(d.response===0){ jsPsych.abortExperiment('Thanks for your time — you can close this tab.'); } } });

timeline.push({ type: jsPsychInstructions, show_clickable_nav:true, pages:[
  '<h3>How it works</h3><p>You will do <strong>three short sections</strong>. In each trial you hear several short segments of the same song and describe how they sound using a few words. The task differs slightly between sections — each is explained when it begins.</p>',
  '<h3>Two rules</h3><p>1. Listen to <strong>every segment fully</strong> — the response unlocks only after all have played, and you cannot skip ahead (you can replay).</p><p>2. At the bottom of every trial, a slider asks how <em>honest vs forced</em> your answer felt. There are no right or wrong answers.</p>',
  '<h3>Practice</h3><p>First, one practice trial to get the feel. It does not count.</p>'
]});

timeline.push( practiceNode() );
timeline.push({ type: jsPsychHtmlButtonResponse, stimulus:'<p>That was practice. The three real sections begin now — thank you!</p>', choices:['Begin'] });

timeline.push(mainLoop);

/* ---------- final preference ---------- */
timeline.push({ type: jsPsychSurveyMultiChoice, preamble:'<h3>Comparing the three sections</h3>', questions:[
  {prompt:'Which section felt most HONEST (least forced)?', options:['Choosing one word','Rating each word','Matching words to segments',"I don't know"], required:true, name:'most_honest'},
  {prompt:'Which was EASIEST?', options:['Choosing one word','Rating each word','Matching words to segments',"I don't know"], required:true, name:'easiest'},
  {prompt:'Which did you PREFER overall?', options:['Choosing one word','Rating each word','Matching words to segments',"I don't know"], required:true, name:'preferred'}
], data:{task:'final_pref'} });
timeline.push({ type: jsPsychSurveyHtmlForm, button_label:'Finish',
  html:'<p>Anything confusing, tiring, or that you would change? (optional)</p><textarea name="feedback" rows="3" cols="50"></textarea>',
  data:{task:'final_open'} });

/* ---------- save ---------- */
timeline.push({ type: jsPsychCallFunction, async:true, func: async function(done){
  const filename='pilot_'+PID+'_'+Date.now()+'.csv';
  // keep only the final answer per trial (Back can create earlier revisit rows)
  const maxSeq={}; jsPsych.data.get().values().forEach(r=>{ if(r.nav_seq!=null){ maxSeq[r.trial_id]=Math.max(maxSeq[r.trial_id]??-1, r.nav_seq); } });
  const csv=jsPsych.data.get().filterCustom(function(r){ return r.nav_seq==null || r.nav_seq===maxSeq[r.trial_id]; }).csv();
  if(DATAPIPE_ID && DATAPIPE_ID!=='YOUR_DATAPIPE_ID'){
    try{ await fetch('https://pipe.jatos.org/api/data',{ method:'POST',
      headers:{'Content-Type':'application/json','Accept':'*/*'},
      body:JSON.stringify({ experimentID:DATAPIPE_ID, filename:filename, data:csv }) }); }
    catch(e){ jsPsych.data.get().localSave('csv',filename); }
  } else { jsPsych.data.get().localSave('csv',filename); }
  done();
}});
timeline.push({ type: jsPsychHtmlKeyboardResponse, choices:'NO_KEYS', stimulus:'<h2>All done — thank you!</h2><p>You can close this tab.</p>' });

jsPsych.run(timeline);
</script>
</html>
